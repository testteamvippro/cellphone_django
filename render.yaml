services:
  - type: web
    name: cellphone-django
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py load_sample_data && python manage.py assign_random_images && mkdir -p staticfiles/media && python manage.py collectstatic --noinput && cp -r media/* staticfiles/media/ 2>/dev/null || true
    startCommand: gunicorn cellphone_store.wsgi
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: "3.11.8"
